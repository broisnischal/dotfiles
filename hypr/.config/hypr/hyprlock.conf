source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

// Minimal Black Theme
$bg_black = rgba(0, 0, 0, 0.90)
$surface_dark = rgba(15, 15, 15, 0.98)
$text_white = rgba(250, 250, 250, 1.0)
$text_dim = rgba(120, 120, 120, 1.0)
$accent = rgba(0, 200, 200, 1.0)
$success = rgba(40, 220, 40, 1.0)
$error = rgba(255, 60, 60, 1.0)

// Dynamic wallpaper with heavy blur
background {
    monitor =
    path = ~/.config/omarchy/current/theme/backgrounds/1.png
    blur_passes = 4
    blur_size = 10
    noise = 0.15
    contrast = 0.25
    brightness = -0.15
    radius = 25
}

animations {
    enabled = true
    speed = 2.0
    bezier = myBezier, 0.05, 0.9, 0.1, 1.0
}

// Default tagline
label {
    monitor =
    text = nees still uses a mouse
    font_family = CaskaydiaMono Nerd Font
    font_size = 18
    color = $text_white
    position = 0, -160
    halign = center
    valign = center
}

// Minimal input field
input-field {
    monitor =
    size = 420, 55
    position = 0, 0
    halign = center
    valign = center

    inner_color = $surface_dark
    outer_color = $bg_black
    outline_thickness = 2
    outline_color = $accent

    font_family = CaskaydiaMono Nerd Font
    font_size = 22
    font_color = $text_white

    placeholder_text = <i>password...</i>
    placeholder_color = $text_dim
    check_color = $success
    fail_text = Access denied
    fail_color = $error

    rounding = 10
    shadow_passes = 0
    fade_on_empty = true
    hide_input = true

    cursor_size = 30
    cursor_color = $accent
}

auth {
    fingerprint:enabled = false
}
